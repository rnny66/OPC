name: Platform CI

on:
  pull_request:
    paths:
      - 'platform/**'
      - 'supabase/**'
  push:
    branches: ["main"]
    paths:
      - 'platform/**'
      - 'supabase/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
